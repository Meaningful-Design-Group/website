# ─────────────────────────────────────────────────────────────────────────────
# MDG Website — Build & Deploy
#
# This workflow is provided as a FALLBACK for GitHub Pages deployment.
# If you deploy on Netlify (recommended), Netlify handles building automatically
# and this file is not needed — but it's here if you want GitHub Pages.
#
# GitHub Pages setup requires:
#   1. Settings → Pages → Source: "GitHub Actions"
#   2. For Decap CMS OAuth with GitHub Pages, you'll also need to set up
#      an OAuth proxy (see SETUP.md for instructions).
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Eleventy site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with Eleventy
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_site"

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
